<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Journal Feed</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: 40px auto; background:#f5f5f5;}
    .card { background:white; padding:15px; margin:15px 0; border-radius:10px; }
    h2 { margin:0; font-size:18px; }
    .meta { font-size:12px; color:gray; margin-top:5px;}
  </style>
</head>
<body>

<h1>My Journal Feed</h1>
<div id="articles"></div>

<script>
fetch("./articles.json?v=" + Date.now())
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.items.forEach(item => {
      html += `
        <div class="card">
          <h2><a href="${item.url}" target="_blank">${item.title}</a></h2>
          <div class="meta">${item.journal} · ${item.date}</div>
        </div>
      `;
    });
    document.getElementById("articles").innerHTML = html;
  });
</script>

</body>
</html>
